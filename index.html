<!DOCTYPE html>
<html lang="en">


  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Vanilla SPA</title>
    <link rel="stylesheet" href="frontend/mainstyle.css">
    <link rel="stylesheet" href="frontend/splashstyle.css">
  </head>


  <body>

    <aside id="splashscreen">
      <div class="loader-grid-container">
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item middle"> <!-- do not touch -->
          <svg viewBox="0 0 504 356" xmlns="http://www.w3.org/2000/svg" id="icon" alt="Happiness company icon"></svg>
          <svg viewBox="0 0 1888 261" xmlns="http://www.w3.org/2000/svg" alt="Happiness Logo and subtitle" id="logo1"></svg>
        </div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
      </div>
    </aside>

    <header id="header-logo-text">
      <div class="side-pad">
        <img src="/frontend/graphics/magnifier.svg" alt="Search button"></img>
        <iimg src="/frontend/graphics/flag-cro.svg" alt="HR flag" style="object-fit: cover;"></iimg>
        <iimg src="/frontend/graphics/flag-us.svg" alt="US flag" style="object-fit: cover; object-position: 30% 0;"></-img>
      </div>
      <div class="middle">
          <img src="/frontend/graphics/icon-bold.svg" alt="Happiness Logo"></img>
      </div>
      <div class="side-pad">
        <img src="/frontend/graphics/user.svg" alt="Current user"></img>
        <img src="/frontend/graphics/cart.svg" alt="Shopping cart"></img>
      </div>
    </header>

    <nav>
      <input type="checkbox" class="animate" id="menu-toggle">
      <label for="menu-toggle">
        <div class="menu-icon" id="menu-icon">&#9776;</div>
      </label>
      <ul class="nav-links" id="nav-links">
        <li><a href="/shop" data-link>Proizvodi</a></li>
        <li><a href="/home" data-link>Naslovna stranica</a></li>
        <li><a href="/about" data-link>O nama</a></li>
      </ul>
    </nav>
    <main id="app">
    </main>
  </body>


  <script src="/frontend/index1.js" defer></script>

</html>
