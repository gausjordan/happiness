<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>Happiness</title>
    <link rel="stylesheet" rel="preload" href="/frontend/mainstyle.css" as="style">
    <link rel="stylesheet" href="/frontend/splashstyle.css">
    <base href="/" />
  </head>


  <body>

    <aside id="splashscreen">
      <div class="loader-grid-container">
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item middle"> <!-- do not touch -->
          <svg viewBox="0 0 504 356" xmlns="http://www.w3.org/2000/svg" id="icon" alt="Happiness company icon"></svg>
          <svg viewBox="0 0 1888 261" xmlns="http://www.w3.org/2000/svg" alt="Happiness Logo and subtitle" id="logo1"></svg>
        </div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
        <div class="loader-grid-item"></div>
      </div>
    </aside>

    <header id="header-logo-text">
      <div class="side-pad">
        <img src="/frontend/graphics/magnifier.svg" alt="Search button"></img>
      </div>
      <div class="middle">
          <img src="/frontend/graphics/icon-static.svg" alt="Happiness Logo"></img>
      </div>
      <div class="side-pad">
        <img src="/frontend/graphics/user.svg" alt="Current user"></img>
        <img src="/frontend/graphics/cart.svg" alt="Shopping cart"></img>
      </div>
    </header>

    <nav>
      <input type="checkbox" class="animate" id="menu-toggle">
      <label for="menu-toggle">
        <div class="menu-icon" id="menu-icon">&#9776;</div>
      </label>
      <img src="/frontend/graphics/flag-uk.svg"  class="lang-flag" id="en"></img>
      <img src="/frontend/graphics/flag-hr.svg"  class="lang-flag" id="hr"></img>
      <ul class="nav-links" id="nav-links">
        <a href="/home" data-link>
          <li>
            <span class="hr">Naslovna stranica</span>
            <span class="en">Home page</span>
          </li>
        </a>
        <a href="/shop" data-link>
          <li>
            <span class="hr">Proizvodi</span>
            <span class="en">Products</span>
          </li>
        </a>
        <a href="/about" data-link>
          <li>
            <span class="hr">O nama</span>
            <span class="en">About us</span>
          </li>
        </a>
      </ul>
    </nav>
    <main id="app">
    </main>
  </body>


  <script src="/frontend/index1.js" defer></script>

</html>
