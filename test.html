    <style>

        * {
            padding: 0;
            border: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            background-image: linear-gradient(white, beige);
        }

        .grid-container {
            display: grid;
            height: 100%;
            grid-template-columns: 1fr auto 1fr; /* Horizontal neighbors shrink/grow */
            grid-template-rows: 1fr auto 1fr;   /* Vertical neighbors shrink/grow */
        }

        .grid-item {
            -border: 1px solid black; /* For visibility */
        }
        
        .middle {
            grid-column: 2;
            grid-row: 2;
            -background-color: pink;
            aspect-ratio: 1 / 2;
            height: min(160vw, 80vh);
        }


        svg#graphics {
            width: 60%;
            display: block;
            height:30%;
            /* height:356px; */
            /* width:504px; */
            margin: 0 auto;
            margin-top: 40%;
            opacity: 0.65;
            -background-color: yellow;
        }
        
        svg#graphics > path {
                fill: none;
                stroke: #000000;
                stroke-width: 30;
                stroke-opacity: 1;
        }

        svg#graphics > path.curves {
                stroke-dasharray: 320;
                stroke-dashoffset: 0;
                animation: curve-dash 2s;
                animation-fill-mode: forwards;
                animation-timing-function: cubic-bezier(0.445, 0.05, 0.55, 0.95);
        }

        @keyframes curve-dash {
            0% {
                stroke-dashoffset: -320;
            }
            100% {
                stroke-dashoffset: 0;
            }
        }

        svg#graphics > path.sides {
                stroke-dasharray: 200;
                stroke-dashoffset: 200;
                animation: side-dash 2s;
                animation-delay: 2s;
                animation-timing-function: cubic-bezier(0.23, 1, 0.320, 1);
                animation-fill-mode: forwards;
        }

        @keyframes side-dash {
            0% {
                stroke-dashoffset: 186;
            }
            100% {
                stroke-dashoffset: 0;
            }
        }

        svg#titles {
            width: 100%;
            /* height:261px; */
            /* width:1888px; */
            display: 0 auto;
            margin-top: 10%;
            animation: text 4s;
            animation-timing-function: ease;
            animation-fill-mode: forwards;
            -transform: translate(30px,40px);
        }

        @keyframes text {
            0% {
                transform:translate(0px,40px);
                opacity:0;
            }
            100% {
                transform:translate(0px,0px);
                opacity:0.65;
            }
        }

        @media screen and (orientation: landscape) and (max-height: 400px) {
            html, body {
                height: 100%;
            }
            .middle {
                height: 100dvh;
                width: 90vh;
            }
            svg#graphics {
                width: 100%;
                margin-top: 18%;
            }
            svg#titles {
                width: 100%;
                margin-top: 15%;
            }
        }



    </style>
