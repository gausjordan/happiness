<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Animation</title>
<style>
  /* Basic menu styles */
  .menu {
    width: 200px;
    height: 0;
    background: lightblue;
    overflow: hidden;
    transition: height 0.3s ease;
  }

  /* Open state */
  .menu.open {
    height: 100px; /* Example expanded height */
  }

  /* Prevent transition on page load */
  .menu:not(.initial) {
    transition: height 0.3s ease;
  }

  /* Optional: Hide the "initial" state after load */
  .menu.initial {
    height: 0;
  }
</style>
</head>
<body>

<div class="menu initial">Menu Content</div>
<button onclick="document.querySelector('.menu').classList.toggle('open')">Toggle Menu</button>

<script>
  // Remove the "initial" class after the page loads
  window.onload = () => {
    document.querySelector('.menu').classList.remove('initial');
  };
</script>

</body>
</html>
