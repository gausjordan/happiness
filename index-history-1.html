<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA with Routing</title>
    <style>
        .nav {
            margin: 10px;
        }
        .nav a {
            margin-right: 20px;
            text-decoration: none;
            font-size: 18px;
        }
        .content {
            padding: 20px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="nav">
        <a href="/" onclick="navigate(event, '/')">Home</a>
        <a href="/about" onclick="navigate(event, '/about')">About</a>
        <a href="/contact" onclick="navigate(event, '/contact')">Contact</a>
    </div>

    <main id="main-content" class="content">
        <!-- Content will be dynamically loaded here -->
    </main>

    <script>
        // Page content mapping (similar to different "pages")
        const pages = {
            '/': '<h1>Home Page</h1><p>Welcome to the Home page!</p>',
            '/about': '<h1>About Page</h1><p>This is the About page.</p>',
            '/contact': '<h1>Contact Page</h1><p>This is the Contact page.</p>',
            '/funk' : '<iframe src="demo_iframe.htm" height="200" width="300" title="Iframe Example"></iframe>'
        };

        // Navigation function
        function navigate(event, path) {
            event.preventDefault();  // Prevent default link behavior (page reload)

            // Push the new state to the history
            window.history.pushState({ path }, '', path);

            // Update the content of the main element based on the route
            updateContent(path);
        }

        // Update the main content based on the current path
        function updateContent(path) {
            const content = pages[path] || '<h1>404 Not Found</h1><p>Page not found.</p>';
            document.getElementById('main-content').innerHTML = content;
        }

        // Handle back/forward navigation
        window.addEventListener('popstate', () => {
            updateContent(window.location.pathname);
        });

        // Initialize the SPA based on the current path
        window.addEventListener('load', () => {
            updateContent(window.location.pathname || '/');
        });
    </script>

</body>
</html>
